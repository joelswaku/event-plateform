# ============================================================================
# LiteEvent Railway Deployment with Docker
# ============================================================================
# Deploys to Railway from 'main' or 'railway' branch
# Uses Docker for consistent builds across environments
# Railway automatically detects Dockerfile and builds containers
# ============================================================================

name: Deploy to Railway

on:
  push:
    branches:
      - main
      - railway  # Dedicated branch for Railway deployments
  workflow_dispatch:  # Allow manual triggering

env:
  RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

jobs:
  # ========================================
  # Deploy All Services to Railway
  # ========================================
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    environment:
      name: railway-production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy API Service (Docker)
        working-directory: ./api
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "🚂 Deploying API to Railway with Docker..."
          railway up --service api --detach || echo "⚠️ Service not found - create in Railway dashboard first"
          echo "✅ API deployment triggered"

      - name: Deploy Web Service
        working-directory: ./web
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "🚂 Deploying Web to Railway..."
          railway up --service web --detach || echo "⚠️ Service not found - create in Railway dashboard first"
          echo "✅ Web deployment triggered"

      - name: Deploy Vendors Service
        working-directory: ./vendors
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "🚂 Deploying Vendors to Railway..."
          railway up --service vendors --detach || echo "⚠️ Service not found - create in Railway dashboard first"
          echo "✅ Vendors deployment triggered"

      - name: Wait for Deployments
        run: |
          echo "⏳ Waiting for Railway deployments to complete..."
          echo "✅ Check deployment status in Railway dashboard"
          sleep 60

  # ========================================
  # Run Database Migrations
  # ========================================
  migrate:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    needs: deploy
    if: contains(github.event.head_commit.message, '[migrate]')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Run migrations
        working-directory: ./api
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "🔄 Running database migrations on Railway..."
          railway run --service api npm run migrate || echo "⚠️ Migration failed or service not ready"
          echo "✅ Migration step completed"

  # ========================================
  # Notify Deployment Status
  # ========================================
  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()

    steps:
      - name: Deployment Success
        if: needs.deploy.result == 'success'
        run: |
          echo "🎉 RAILWAY DEPLOYMENT SUCCESSFUL!"
          echo ""
          echo "🌐 Check your services at:"
          echo "  - Railway Dashboard: https://railway.com/dashboard"
          echo ""
          echo "📊 User Count Monitoring:"
          echo "  - Current deployment: Railway (< 20K users)"
          echo "  - Switch to AWS when approaching 20,000 users"

      - name: Deployment Failure
        if: needs.deploy.result == 'failure'
        run: |
          echo "❌ RAILWAY DEPLOYMENT FAILED!"
          echo "Check the logs above for details."
          echo ""
          echo "Common issues:"
          echo "  - Services not created in Railway dashboard"
          echo "  - Invalid RAILWAY_TOKEN"
          echo "  - Missing environment variables"
          exit 1

  # ========================================
  # Create GitHub Release
  # ========================================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [deploy]
    if: github.event_name == 'push' && needs.deploy.result == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: railway-v${{ github.run_number }}
          name: Railway Deployment v${{ github.run_number }}
          body: |
            ## Deployed to Railway

            **Platform:** Railway (< 20K users)
            **Commit:** ${{ github.sha }}
            **Author:** ${{ github.actor }}
            **Date:** ${{ github.event.head_commit.timestamp }}

            ### Changes
            ${{ github.event.head_commit.message }}

            ### Services Deployed
            - 🚂 API Service (Docker)
            - 🚂 Web Service
            - 🚂 Vendors Service

            ### Check Deployment
            Visit Railway Dashboard to verify deployment status and get URLs.

          draft: false
          prerelease: false
