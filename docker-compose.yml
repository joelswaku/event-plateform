version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: event-platform-postgres
    environment:
      POSTGRES_DB: eventplatform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Liteeventswamaa
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - event-platform-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: event-platform-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - event-platform-network

  # API Service
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: development
    container_name: event-platform-api
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgresql://postgres:Liteeventswamaa@postgres:5432/eventplatform
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev_jwt_secret_change_in_production
      JWT_REFRESH_SECRET: dev_jwt_refresh_secret_change_in_production
      CORS_ORIGIN: http://localhost:3000,http://localhost:3001
      # Add your other environment variables here
    ports:
      - "5000:5000"
    volumes:
      - ./api:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - event-platform-network
    command: npm run dev

  # Web App Service
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      target: deps
    container_name: event-platform-web
    environment:
      NODE_ENV: development
      PORT: 3000
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api
    networks:
      - event-platform-network
    command: npm run dev

  # Vendors App Service
  vendors:
    build:
      context: ./vendors
      dockerfile: Dockerfile
      target: deps
    container_name: event-platform-vendors
    environment:
      NODE_ENV: development
      PORT: 3001
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
    ports:
      - "3001:3001"
    volumes:
      - ./vendors:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api
    networks:
      - event-platform-network
    command: npm run dev

volumes:
  postgres_data:
  redis_data:

networks:
  event-platform-network:
    driver: bridge
